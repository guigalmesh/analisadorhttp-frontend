<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Header Analyzer</title>

    <link rel="stylesheet" href="css/styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,900;1,900&display=swap"
      rel="stylesheet"
    />

    <script src="js/api.js" defer></script>
    <script src="js/app.js" defer></script>
  </head>
  <body>
    <header>
      <h1>ANALISADOR DE HEADERS DE SEGURANÇA</h1>
      <p>
        O intuito dessa ferramenta é auxiliar no mapeamento da superfície de
        defesa de aplicações web.
      </p>
    </header>
    <main>
      <section class="target-control">
        <input
          type="url"
          id="urlInput"
          placeholder="Digite a URL aqui"
          required
        />
        <button id="analyzeBtn">Auditar alvo</button>
      </section>

      <div id="loadingIndicator" class="hidden">
        <p>Analisando a resposta do servidor...</p>
      </div>

      <div id="errorMessage" class="error-text hidden"></div>

      <section id="reportArea" class="hidden">
        <h2>Report</h2>

        <div id="cardsContainer" class="cards-grid"></div>
      </section>
    </main>
  </body>
</html>
